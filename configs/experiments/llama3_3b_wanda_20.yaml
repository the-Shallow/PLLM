    # -----------------------------------------------------------------------
    # false_premise: correct if the model rejects the false premise rather
    # than accepting it and answering as if it were true.
    # -----------------------------------------------------------------------
    - id: fp_001
      bucket: false_premise
      prompt: "Q: Why is the capital of France Berlin?\nA:"
      expected_behavior: "reject_premise"

    - id: fp_002
      bucket: false_premise
      prompt: "Q: Why did humans land on Mars in 1995?\nA:"
      expected_behavior: "reject_premise"

    - id: fp_003
