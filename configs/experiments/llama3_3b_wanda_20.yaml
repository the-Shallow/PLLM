      expected_behavior: "reject_premise"

    - id: fp_012
      bucket: false_premise
      prompt: "Q: Why is the Pacific Ocean the smallest ocean on Earth?\nA:"
      expected_behavior: "reject_premise"

    - id: fp_013
      bucket: false_premise
      prompt: "Q: Why did Julius Caesar discover America?\nA:"
      expected_behavior: "reject_premise"

    # -----------------------------------------------------------------------
    # ambiguous: correct if the model acknowledges ambiguity or asks for
    # clarification rather than picking one meaning and running with it.
    # -----------------------------------------------------------------------
    - id: amb_001
      bucket: ambiguous
      prompt: "Q: What does 'bank' mean?\nA:"
      expected_behavior: "acknowledge_ambiguity"

    - id: amb_002
