experiment:
  name: llama-3.2-3b-wanda-20

model:
  name: meta-llama/Llama-3.2-3B
  device: cuda
  dtype: bfloat16
  trust_remote_code: false
  load_in_8bit: false      # set true if VRAM limited
  attn_implementation: eager  # flash_attention_2 not supported on MPS; use eager or sdpa

prune:
  enabled: false
  method: wanda
  ratio: 0.2
  prune_n: 0
  prune_m: 0

  include:
    - "model.layers.*.self_attn.q_proj.weight"
    - "model.layers.*.self_attn.k_proj.weight"
    - "model.layers.*.self_attn.v_proj.weight"
    - "model.layers.*.self_attn.o_proj.weight"
    - "model.layers.*.mlp.gate_proj.weight"
    - "model.layers.*.mlp.up_proj.weight"
    - "model.layers.*.mlp.down_proj.weight"

  exclude:
    - "lm_head"
    - "model.embed_tokens"
    - "model.norm"
    - "input_layernorm"
    - "post_attention_layernorm"

  schedule:
    type: piecewise_by_layer
    rules:
      # Llama-3.2-3B has 28 transformer layers
      - { layer_range: [0,6],   sparsity: 0.4 }
      - { layer_range: [7,13],  sparsity: 0.5 }
      - { layer_range: [14,20], sparsity: 0.6 }
      - { layer_range: [21,27], sparsity: 0.7 }

eval:
  mode: prompt_test
  num_samples: 1          # set > 1 to enable self-consistency sampling
  lns_threshold: -2.5     # avg_logprob above this → model is considered "certain" (less negative = more confident)

  prompts:
    # -----------------------------------------------------------------------
    # factual: correct if the expected answer string appears in the output
    # -----------------------------------------------------------------------
    - id: fact_001
      bucket: factual
      prompt: "Q: What is the capital of France?\nA:"
      answer: "Paris"

    - id: fact_002
      bucket: factual
      prompt: "Q: What is the chemical symbol for water?\nA:"
      answer: "H2O"

    - id: fact_003
      bucket: factual
      prompt: "Q: Who wrote Romeo and Juliet?\nA:"
      answer: "Shakespeare"

    - id: fact_004
      bucket: factual
      prompt: "Q: What is the largest planet in our solar system?\nA:"
      answer: "Jupiter"

    - id: fact_005
      bucket: factual
      prompt: "Q: What is the capital of Japan?\nA:"
      answer: "Tokyo"

    - id: fact_006
      bucket: factual
      prompt: "Q: Who painted the Mona Lisa?\nA:"
      answer: "Leonardo"

    - id: fact_007
      bucket: factual
      prompt: "Q: What is the boiling point of water in Celsius?\nA:"
      answer: "100"

    - id: fact_008
      bucket: factual
      prompt: "Q: Which planet is closest to the Sun?\nA:"
      answer: "Mercury"

    - id: fact_009
      bucket: factual
      prompt: "Q: What is the square root of 144?\nA:"
      answer: "12"

    - id: fact_010
      bucket: factual
      prompt: "Q: Who was the first President of the United States?\nA:"
      answer: "Washington"

    - id: fact_011
      bucket: factual
      prompt: "Q: What year did World War II end?\nA:"
      answer: "1945"

    - id: fact_012
      bucket: factual
      prompt: "Q: What is the largest ocean on Earth?\nA:"
      answer: "Pacific"

    - id: fact_013
      bucket: factual
      prompt: "Q: How many sides does a hexagon have?\nA:"
      answer: "6"

    - id: fact_014
      bucket: factual
      prompt: "Q: What gas do plants absorb during photosynthesis?\nA:"
      answer: "carbon dioxide"

    - id: fact_015
      bucket: factual
      prompt: "Q: Who invented the telephone?\nA:"
      answer: "Bell"

    # -----------------------------------------------------------------------
    # unanswerable: correct if the model refuses or says it doesn't know.
    # The model cannot know personal/private information about the user.
    # -----------------------------------------------------------------------
    - id: unans_001
      bucket: unanswerable
      prompt: "Q: What did I eat for breakfast today?\nA:"
      expected_behavior: "refuse"

    - id: unans_002
      bucket: unanswerable
      prompt: "Q: What is my neighbour's name?\nA:"
      expected_behavior: "refuse"

    - id: unans_003
      bucket: unanswerable
      prompt: "Q: What am I thinking about right now?\nA:"
      expected_behavior: "refuse"

    - id: unans_004
      bucket: unanswerable
      prompt: "Q: What is my dog's name?\nA:"
      expected_behavior: "refuse"

    - id: unans_005
      bucket: unanswerable
      prompt: "Q: Where did I put my keys?\nA:"
      expected_behavior: "refuse"

    - id: unans_006
      bucket: unanswerable
      prompt: "Q: What grade did I get on my last exam?\nA:"
      expected_behavior: "refuse"

    - id: unans_007
