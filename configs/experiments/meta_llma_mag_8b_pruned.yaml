experiment:
  name: llama-3.1-8b-instruct-mag-layerwise

profile: hazel

model:
  name: meta-llama/Llama-3.1-8B-Instruct
  device: cuda
  dtype: bfloat16
  trust_remote_code: true
  load_in_8bit: false
  attn_implementation: flash_attention_2

prune:
  enabled: true
  method: magnitude

  include:
    - "model.layers.*.self_attn.q_proj.weight"
    - "model.layers.*.self_attn.k_proj.weight"
    - "model.layers.*.self_attn.v_proj.weight"
    - "model.layers.*.self_attn.o_proj.weight"
    - "model.layers.*.mlp.gate_proj.weight"
    - "model.layers.*.mlp.up_proj.weight"
    - "model.layers.*.mlp.down_proj.weight"

  exclude:
    - "lm_head"
    - "model.norm"
    - "input_layernorm"
    - "model.embed_tokens"
    - "post_attention_layernorm"

  schedule:
    type: piecewise_by_layer
    rules:
      # Llama-3.1-8B has 32 layers
      - { layer_range: [0,7], sparsity: 0.4 }
      - { layer_range: [8,15], sparsity: 0.5 }
      - { layer_range: [16,23], sparsity: 0.6 }
      - { layer_range: [24,31], sparsity: 0.7 }

eval:
  mode: prompt_test
  num_samples: 1          # set > 1 to enable self-consistency sampling
  lns_threshold: -2.5     # avg_logprob above this → model is considered "certain" (less negative = more confident)

  prompts:
    - id: fact_001
      bucket: factual
      prompt: "Q: Who developed the Paxos consensus algorithm?\nA:"
      answer: "Leslie Lamport"
      expected_behavior: "correct_answer"

    - id: fact_002
      bucket: factual
      prompt: "Q: Which theorem states that no deterministic consensus protocol can guarantee termination in an asynchronous system with one faulty process?\nA:"
      answer: "FLP impossibility theorem"
      expected_behavior: "correct_answer"

    - id: fact_003
      bucket: factual
      prompt: "Q: What enzyme unwinds the DNA double helix during replication?\nA:"
      answer: "helicase"
      expected_behavior: "correct_answer"

    - id: fact_004
      bucket: factual
      prompt: "Q: Which physicist formulated the uncertainty principle?\nA:"
      answer: "Werner Heisenberg"
      expected_behavior: "correct_answer"

    - id: fact_005
      bucket: factual
      prompt: "Q: What algorithm is commonly used to find the shortest paths from a single source in a weighted graph with nonnegative edge weights?\nA:"
      answer: "Dijkstra's algorithm"
      expected_behavior: "correct_answer"

    - id: fact_006
      bucket: factual
      prompt: "Q: Which cryptographic hash function family was standardized by NIST as SHA-3?\nA:"
      answer: "Keccak"
      expected_behavior: "correct_answer"

    - id: fact_007
      bucket: factual
      prompt: "Q: What is the main function of the CRISPR-Cas9 system in biotechnology?\nA:"
      answer: "gene editing"
      expected_behavior: "correct_answer"

