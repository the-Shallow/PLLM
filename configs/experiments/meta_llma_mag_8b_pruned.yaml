      prompt: "Q: What transform converts a signal from the time domain into the frequency domain?\nA:"
      answer: "Fourier transform"
      expected_behavior: "correct_answer"

    - id: fact_010
      bucket: factual
      prompt: "Q: Which database property ensures that a transaction is treated as a single all-or-nothing unit?\nA:"
      answer: "atomicity"
      expected_behavior: "correct_answer"

    - id: fact_011
      bucket: factual
      prompt: "Q: Who introduced the concept of the universal Turing machine?\nA:"
      answer: "Alan Turing"
      expected_behavior: "correct_answer"

    - id: fact_012
